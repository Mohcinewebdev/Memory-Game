<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Game</title>
  
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: {
              dark: '#0f172a',
              card: '#1e293b',
              accent: '#3b82f6',
              glow: '#60a5fa',
              success: '#10b981'
            }
          }
        }
      }
    }
  </script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-brand-dark text-white min-h-screen flex flex-col items-center relative overflow-x-hidden selection:bg-brand-accent selection:text-white">
  
  <!-- Animated Background Elements -->
  <div class="absolute top-[-20%] left-[-10%] w-[50vw] h-[50vw] bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-20 animate-pulse pointer-events-none"></div>
  <div class="absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] bg-purple-600 rounded-full mix-blend-screen filter blur-[100px] opacity-20 animate-pulse pointer-events-none" style="animation-delay: 2s; animation-duration: 4s;"></div>

  <!-- Main Container -->
  <main class="relative z-10 flex flex-col items-center w-full max-w-3xl px-4 py-8 my-auto">
    
    <!-- Header -->
    <header class="w-full flex flex-row justify-between items-center gap-2 sm:gap-4 bg-brand-card/60 backdrop-blur-xl border border-white/10 p-3 sm:p-5 rounded-2xl shadow-2xl mb-4 sm:mb-6">
      <div class="flex flex-col items-start">
        <h1 class="text-xl sm:text-4xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent drop-shadow-sm leading-tight">Memory Game</h1>
        <a href="https://median.co/share/wepapbr#apk" class="text-[10px] sm:text-sm font-semibold text-emerald-400 hover:text-emerald-300 transition-colors mt-0.5 flex items-center gap-1 group">
          <span class="hidden sm:inline">Download Android App</span>
          <span class="sm:hidden">Get App</span>
          <svg class="w-3 h-3 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </a>
      </div>
      
      <div class="flex items-center gap-2 sm:gap-3">
        <div class="bg-brand-dark/80 px-2 sm:px-5 py-1.5 sm:py-2.5 rounded-lg sm:rounded-xl border border-white/5 shadow-inner flex flex-col sm:flex-row items-center sm:gap-3">
          <span class="text-gray-400 text-[10px] sm:text-sm font-bold uppercase tracking-widest leading-none">Moves</span>
          <span id="moves" class="text-lg sm:text-2xl font-black text-blue-400 w-auto sm:w-8 text-center leading-none mt-0.5 sm:mt-0">0</span>
        </div>
        <button id="reset" class="btn-primary text-xs sm:text-base px-3 py-1.5 sm:px-6 sm:py-2.5">
          Restart
        </button>
      </div>
    </header>

    <!-- Game Board -->
    <div id="game-board" class="grid grid-cols-4 gap-2 sm:gap-4 w-full max-w-lg mx-auto perspective-container p-3 sm:p-5 bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl sm:rounded-3xl shadow-2xl"></div>

  </main>

  <!-- Custom Win Modal -->
  <div id="win-modal" class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500 bg-brand-dark/80 backdrop-blur-md">
    <div class="modal-content bg-brand-card border border-white/10 p-8 rounded-3xl shadow-2xl transform scale-90 transition-transform duration-500 text-center max-w-sm w-full mx-4 relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-emerald-400 to-blue-500"></div>
      <div class="mb-4 text-5xl">🏆</div>
      <h2 class="text-4xl font-extrabold mb-2 text-white">You Won!</h2>
      <p class="text-gray-400 mb-6 font-medium text-lg">Total Moves: <span id="final-score" class="text-white font-bold text-2xl"></span></p>
      
      <div id="evaluation-message" class="text-xl font-bold bg-white/5 py-4 px-4 rounded-xl mb-8 border border-white/5 shadow-inner"></div>
      
      <button id="modal-close" class="btn-primary w-full py-4 text-xl tracking-wide uppercase">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
