<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Game</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-yellow-200 flex flex-col items-center p-6 gap-4">

  <h1 class="text-3xl font-bold bg-blue-600 text-white px-2 py-4 mt-6 rounded-lg w-full">🧠 Memory Game</h1>

  <div class="flex gap-6 text-lg">
    <p>Moves: <span id="moves">0</span></p>
    <button id="reset" class="px-4 py-1 bg-blue-600 text-white rounded">
      Restart
    </button>
  </div>

  <div id="game-board" class="grid grid-cols-4 gap-4 mt-4"></div>

  <script src="script.js"></script>
</body>
</html>
